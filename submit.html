<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Data - NanoKineticsDB</title>
    <style>
        body { background-color: #ADD8E6; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-align: center; }
        header { width: 100%; background-color: #003366; color: white; padding: 15px 0; font-size: 1.2rem; font-weight: bold; }
        .form-container { margin-top: 40px; background-color: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 15px; width: 90%; max-width: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: left; margin-bottom: 40px; }
        h2 { color: #002244; text-align: center; border-bottom: 2px solid #00509E; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #003366; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button.submit-btn { width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold; color: white; background-color: #28a745; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button.submit-btn:hover { background-color: #218838; }
        button.back-btn { margin-top: 20px; padding: 10px 20px; background-color: #00509E; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #statusMessage { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <header>JIIT - Noida</header>

    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Home</button>

    <div class="form-container">
        <h2>Submit Kinetic Data</h2>
        <p style="text-align:center; color:#666; font-size:0.9rem;">Submissions are sent to the admin queue for review before appearing in the public database.</p>
        
        <form id="submissionForm">
            <div class="form-group">
                <label>Material Name</label>
                <input type="text" id="material_name" required placeholder="e.g., Fe3O4 Nanoparticles">
            </div>
            <div class="form-group">
                <label>Substrate</label>
                <input type="text" id="substrate" required placeholder="e.g., TMB, H2O2">
            </div>
            <div class="form-group">
                <label>Vmax (M/s)</label>
                <input type="number" step="any" id="vmax" required>
            </div>
            <div class="form-group">
                <label>Km (mM)</label>
                <input type="number" step="any" id="km" required>
            </div>
            <div class="form-group">
                <label>Optimal pH</label>
                <input type="number" step="0.1" id="ph" required>
            </div>
            <div class="form-group">
                <label>Optimal Temp (°C)</label>
                <input type="number" step="0.1" id="temp" required>
            </div>
            <button type="submit" class="submit-btn">Submit for Review</button>
        </form>
        <div id="statusMessage"></div>
    </div>

    <script>
        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.style.color = '#00509E';
            statusDiv.innerText = 'Sending to cloud database...';

            const payload = {
                material_name: document.getElementById('material_name').value,
                substrate: document.getElementById('substrate').value,
                vmax: document.getElementById('vmax').value,
                km: document.getElementById('km').value,
                ph: document.getElementById('ph').value,
                temp: document.getElementById('temp').value
            };

            try {
                // Pointing directly to your LIVE Render server
                const response = await fetch('https://nanokinetics-db.onrender.com/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.style.color = 'green';
                    statusDiv.innerText = result.message || 'Success! Added to the pending queue.';
                    document.getElementById('submissionForm').reset(); // Clear the form
                } else {
                    statusDiv.style.color = 'red';
                    statusDiv.innerText = result.error || 'Failed to submit data.';
                }
            } catch (error) {
                console.error("Submission error:", error);
                statusDiv.style.color = 'red';
                statusDiv.innerText = 'Connection error. Ensure your cloud server is running.';
            }
        });
    </script>
</body>
</html>
